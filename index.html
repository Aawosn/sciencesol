<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biology SOL Review Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b1120;
    --surface: #111827;
    --surface2: #1a2540;
    --border: #1f3058;
    --accent: #22d3a0;
    --accent2: #38bdf8;
    --wrong: #f87171;
    --wrong-bg: #2a1010;
    --right-bg: #0a2a1c;
    --text: #e2e8f0;
    --muted: #64748b;
    --tag: #1e3a5f;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Space Grotesk', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Header */
  .header {
    width: 100%;
    background: linear-gradient(135deg, #0b1d36 0%, #0b1120 60%);
    border-bottom: 1px solid var(--border);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-title {
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    color: var(--accent);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .header-score {
    font-family: 'DM Mono', monospace;
    font-size: 0.9rem;
    color: var(--accent2);
  }

  /* Progress bar */
  .progress-wrap {
    width: 100%;
    height: 4px;
    background: var(--border);
    position: sticky;
    top: 57px;
    z-index: 99;
  }
  .progress-bar {
    height: 4px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.4s ease;
    width: 0%;
  }

  /* Main card */
  .container {
    width: 100%;
    max-width: 780px;
    padding: 36px 24px 60px;
  }

  /* Start screen */
  .start-screen {
    text-align: center;
    padding: 60px 20px;
  }
  .dna-icon {
    font-size: 4rem;
    margin-bottom: 20px;
    animation: spin 10s linear infinite;
    display: inline-block;
  }
  @keyframes spin {
    0% { transform: rotateY(0deg); }
    100% { transform: rotateY(360deg); }
  }
  .start-title {
    font-size: 2.2rem;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 12px;
  }
  .start-sub {
    font-size: 1rem;
    color: var(--muted);
    margin-bottom: 32px;
    line-height: 1.6;
  }
  .stats-row {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-bottom: 40px;
    flex-wrap: wrap;
  }
  .stat-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 28px;
    min-width: 130px;
  }
  .stat-num {
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--accent);
    font-family: 'DM Mono', monospace;
  }
  .stat-lbl {
    font-size: 0.75rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-top: 4px;
  }

  /* Buttons */
  .btn {
    display: inline-block;
    padding: 14px 40px;
    border-radius: 10px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    letter-spacing: 0.02em;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    color: #0b1120;
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(34,211,160,0.3); }

  /* Question card */
  .q-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .q-meta {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .q-num {
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    color: var(--muted);
    background: var(--surface2);
    padding: 4px 10px;
    border-radius: 6px;
  }
  .q-slide-tag {
    font-size: 0.75rem;
    color: var(--accent2);
    background: var(--tag);
    padding: 4px 10px;
    border-radius: 6px;
    font-family: 'DM Mono', monospace;
  }
  .q-section-tag {
    font-size: 0.72rem;
    color: var(--muted);
    background: var(--surface2);
    padding: 4px 10px;
    border-radius: 6px;
  }
  .q-text {
    font-size: 1.15rem;
    font-weight: 600;
    line-height: 1.55;
    color: var(--text);
    margin-bottom: 28px;
  }

  /* Answer options */
  .options {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .option {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 18px;
    border-radius: 10px;
    border: 1.5px solid var(--border);
    background: var(--surface2);
    cursor: pointer;
    transition: all 0.18s;
    font-size: 0.97rem;
    font-weight: 500;
  }
  .option:hover:not(.locked) {
    border-color: var(--accent2);
    background: #162032;
  }
  .option.correct {
    border-color: var(--accent);
    background: var(--right-bg);
    color: #a7f3d0;
  }
  .option.wrong {
    border-color: var(--wrong);
    background: var(--wrong-bg);
    color: #fca5a5;
  }
  .option.locked { cursor: default; }
  .option-letter {
    min-width: 28px;
    height: 28px;
    border-radius: 6px;
    background: var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--muted);
    transition: all 0.18s;
  }
  .option.correct .option-letter { background: var(--accent); color: #0b1120; }
  .option.wrong .option-letter { background: var(--wrong); color: #0b1120; }

  /* Feedback */
  .feedback {
    margin-top: 20px;
    padding: 14px 18px;
    border-radius: 10px;
    font-size: 0.92rem;
    line-height: 1.5;
    display: none;
  }
  .feedback.show { display: block; animation: fadeIn 0.2s ease; }
  .feedback.correct-fb { background: var(--right-bg); border: 1px solid var(--accent); color: #a7f3d0; }
  .feedback.wrong-fb { background: var(--wrong-bg); border: 1px solid var(--wrong); color: #fca5a5; }
  .feedback-icon { font-weight: 700; margin-right: 6px; }

  /* Navigation */
  .nav-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 28px;
    gap: 12px;
  }
  .btn-next {
    display: none;
    padding: 12px 32px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #0b1120;
    font-weight: 700;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.95rem;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    letter-spacing: 0.02em;
  }
  .btn-next.show { display: inline-block; }
  .btn-next:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(34,211,160,0.35); }
  .score-tally {
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    color: var(--muted);
  }
  .score-tally span { color: var(--accent); }

  /* Results screen */
  .results-screen {
    text-align: center;
    padding: 40px 20px;
    display: none;
  }
  .results-screen.show { display: block; animation: fadeIn 0.5s ease; }
  .score-circle {
    width: 180px;
    height: 180px;
    border-radius: 50%;
    margin: 0 auto 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .score-circle svg {
    position: absolute;
    top: 0; left: 0;
    width: 180px; height: 180px;
    transform: rotate(-90deg);
  }
  .score-circle svg circle {
    fill: none;
    stroke-width: 8;
    stroke-linecap: round;
  }
  .score-circle svg .track { stroke: var(--border); }
  .score-circle svg .fill { stroke: url(#scoreGrad); stroke-dasharray: 502; stroke-dashoffset: 502; transition: stroke-dashoffset 1.5s ease; }
  .score-inner {
    position: relative;
    z-index: 2;
  }
  .score-big {
    font-size: 2.2rem;
    font-weight: 700;
    font-family: 'DM Mono', monospace;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .score-max {
    font-size: 0.8rem;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }
  .result-grade {
    font-size: 1.6rem;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .result-msg {
    color: var(--muted);
    margin-bottom: 32px;
    font-size: 0.95rem;
    line-height: 1.6;
  }
  .result-breakdown {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 16px;
    margin-bottom: 36px;
    text-align: left;
  }
  .rb-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 18px;
  }
  .rb-val {
    font-size: 1.4rem;
    font-weight: 700;
    font-family: 'DM Mono', monospace;
    color: var(--accent2);
  }
  .rb-lbl {
    font-size: 0.73rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-top: 4px;
  }
  .section-breakdown {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 32px;
    text-align: left;
  }
  .sb-title {
    font-size: 0.8rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 16px;
    font-family: 'DM Mono', monospace;
  }
  .sb-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
    font-size: 0.88rem;
  }
  .sb-label { min-width: 160px; color: var(--text); }
  .sb-bar-wrap { flex: 1; height: 6px; background: var(--border); border-radius: 3px; }
  .sb-bar { height: 6px; border-radius: 3px; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width 1.2s ease; }
  .sb-pct { min-width: 40px; text-align: right; font-family: 'DM Mono', monospace; font-size: 0.8rem; color: var(--accent); }

  .btn-retry {
    padding: 14px 40px;
    border-radius: 10px;
    background: var(--surface2);
    color: var(--text);
    font-weight: 600;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1rem;
    cursor: pointer;
    border: 1.5px solid var(--border);
    transition: all 0.2s;
    margin-right: 12px;
  }
  .btn-retry:hover { border-color: var(--accent2); color: var(--accent2); }

  .hidden { display: none; }

  @media (max-width: 600px) {
    .q-text { font-size: 1rem; }
    .header { padding: 14px 16px; }
    .container { padding: 20px 14px 50px; }
    .q-card { padding: 22px 16px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-title">🧬 Biology SOL Review</div>
  <div class="header-score" id="hdrScore" style="display:none">Score: <span id="liveScore">0</span> / 600</div>
</div>
<div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>

<div class="container">

  <!-- START SCREEN -->
  <div class="start-screen" id="startScreen">
    <div class="dna-icon">🧬</div>
    <div class="start-title">Biology SOL Review</div>
    <div class="start-sub">Test your knowledge across all major biology topics.<br>Each correct answer earns 4 points — can you ace it?</div>
    <div class="stats-row">
      <div class="stat-box"><div class="stat-num">150</div><div class="stat-lbl">Questions</div></div>
      <div class="stat-box"><div class="stat-num">600</div><div class="stat-lbl">Max Score</div></div>
      <div class="stat-box"><div class="stat-num">9</div><div class="stat-lbl">Topics</div></div>
    </div>
    <button class="btn btn-primary" onclick="startQuiz()">Start Quiz →</button>
  </div>

  <!-- QUIZ SCREEN -->
  <div id="quizScreen" class="hidden">
    <div class="q-card" id="qCard">
      <div class="q-meta">
        <span class="q-num" id="qNum">Q 1 / 150</span>
        <span class="q-slide-tag" id="qSlide">Slide 1</span>
        <span class="q-section-tag" id="qSection"></span>
      </div>
      <div class="q-text" id="qText"></div>
      <div class="options" id="optionsWrap"></div>
      <div class="feedback" id="feedback"></div>
      <div class="nav-row">
        <div class="score-tally">Correct: <span id="tallyCorrect">0</span> &nbsp;|&nbsp; Wrong: <span id="tallyWrong">0</span></div>
        <button class="btn-next" id="btnNext" onclick="nextQuestion()">Next →</button>
      </div>
    </div>
  </div>

  <!-- RESULTS SCREEN -->
  <div class="results-screen" id="resultsScreen">
    <div class="score-circle" id="scoreCircle">
      <svg viewBox="0 0 180 180">
        <defs>
          <linearGradient id="scoreGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#22d3a0"/>
            <stop offset="100%" style="stop-color:#38bdf8"/>
          </linearGradient>
        </defs>
        <circle class="track" cx="90" cy="90" r="80"/>
        <circle class="fill" id="scoreArc" cx="90" cy="90" r="80"/>
      </svg>
      <div class="score-inner">
        <div class="score-big" id="finalScore">0</div>
        <div class="score-max">/ 600</div>
      </div>
    </div>
    <div class="result-grade" id="resultGrade"></div>
    <div class="result-msg" id="resultMsg"></div>
    <div class="result-breakdown" id="resultBreakdown"></div>
    <div class="section-breakdown">
      <div class="sb-title">Performance by Topic</div>
      <div id="sectionBars"></div>
    </div>
    <button class="btn-retry" onclick="restartQuiz()">↺ Try Again</button>
    <button class="btn btn-primary" onclick="reviewMissed()">Review Missed Questions</button>
  </div>

  <!-- REVIEW SCREEN -->
  <div id="reviewScreen" class="hidden">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px;">
      <h2 style="font-size:1.2rem;color:var(--accent2)">📋 Missed Questions Review</h2>
      <button class="btn-retry" onclick="showResults()">← Back to Results</button>
    </div>
    <div id="reviewList"></div>
  </div>

</div>

<script>
const QUESTIONS = [
  // ── PART 1: Scientific Investigation ──────────────────────────────────────
  { slide:1, section:"Scientific Investigation", q:"What subject is this SOL review covering?", opts:["Chemistry","Physics","Biology","Earth Science"], ans:2 },
  { slide:2, section:"Scientific Investigation", q:"Part 1 of this review covers Scientific Investigation. Which standard does it correspond to?", opts:["BIO.2","BIO.1","BIO.4","BIO.3"], ans:1 },
  { slide:3, section:"Scientific Investigation", q:"According to biology, all scientific inquiry begins with:", opts:["A hypothesis","A theory","An experiment","An observation"], ans:3 },
  { slide:4, section:"Scientific Investigation", q:"Which of the following is NOT a characteristic of life?", opts:["Grows and develops","Responds to stimuli","Composed of metal","Requires energy"], ans:2 },
  { slide:4, section:"Scientific Investigation", q:"Which characteristic of life refers to an organism maintaining constant internal conditions?", opts:["Evolves","Reproduces","Homeostasis","Responds to stimuli"], ans:2 },
  { slide:5, section:"Scientific Investigation", q:"In the scientific method, which step comes directly AFTER forming a hypothesis?", opts:["Make an observation","Report findings","Draw conclusions","Conduct an experiment"], ans:3 },
  { slide:5, section:"Scientific Investigation", q:"In an 'If...then...' hypothesis statement, the part after 'THEN' represents:", opts:["The control group","The dependent variable","The independent variable","A constant"], ans:1 },
  { slide:7, section:"Scientific Investigation", q:"Why are encyclopedias generally NOT ideal for scientific research?", opts:["They are too short","They can be outdated and biased","They are peer-reviewed","They focus only on chemistry"], ans:1 },
  { slide:7, section:"Scientific Investigation", q:"Scholarly journal articles are best described as:", opts:["Always biased","Not reviewed by experts","Peer-reviewed by experts in the field","Only published in print"], ans:2 },
  { slide:8, section:"Scientific Investigation", q:"What is the group that remains unchanged or 'normal' in an experiment called?", opts:["Experimental group","Dependent variable","Control group","Independent variable"], ans:2 },
  { slide:8, section:"Scientific Investigation", q:"Constants in an experiment are:", opts:["Things that change","The results you measure","Parts that remain the same for all groups","The hypothesis variables"], ans:2 },
  { slide:9, section:"Scientific Investigation", q:"In Mrs. Dietrich's experiment, what was the independent variable?", opts:["Test scores","Number of students","Use of note cards","Number of study days"], ans:2 },
  { slide:9, section:"Scientific Investigation", q:"In Mrs. Dietrich's experiment, Group B (no note cards) served as the:", opts:["Experimental group","Independent variable","Dependent variable","Control group"], ans:3 },
  { slide:10, section:"Scientific Investigation", q:"A scientific _____ describes a truth that is valid everywhere in the universe.", opts:["Theory","Law","Hypothesis","Inference"], ans:1 },
  { slide:11, section:"Scientific Investigation", q:"Which level of organization comes AFTER 'organism' but BEFORE 'community'?", opts:["Biome","Population","Ecosystem","Biosphere"], ans:1 },
  { slide:11, section:"Scientific Investigation", q:"What is the LARGEST level of biological organization?", opts:["Biome","Ecosystem","Community","Biosphere"], ans:3 },

  // ── PART 2: Biochemistry ──────────────────────────────────────────────────
  { slide:13, section:"Biochemistry", q:"Which property of water describes it sticking to OTHER substances (not itself)?", opts:["Cohesion","High specific heat","Universal solvent","Adhesion"], ans:3 },
  { slide:13, section:"Biochemistry", q:"Water is described as 'polar' because:", opts:["It only exists at the poles","It has slightly positive and slightly negative regions","It has no charge","It repels other molecules"], ans:1 },
  { slide:13, section:"Biochemistry", q:"Which property of water means it resists changes in temperature?", opts:["Cohesion","Adhesion","High specific heat","Universal solvent"], ans:2 },
  { slide:15, section:"Biochemistry", q:"What is the pH of a neutral solution?", opts:["0","7","14","3"], ans:1 },
  { slide:15, section:"Biochemistry", q:"An acid has a pH range of:", opts:["7–14","Above 7","0–7","Exactly 7"], ans:2 },
  { slide:16, section:"Biochemistry", q:"Which atom is considered the 'building block of life' because it forms the basis of most biological molecules?", opts:["Oxygen","Nitrogen","Hydrogen","Carbon"], ans:3 },
  { slide:17, section:"Biochemistry", q:"What is the monomer (building block) of a carbohydrate?", opts:["Amino acid","Nucleotide","Triglyceride","Monosaccharide"], ans:3 },
  { slide:17, section:"Biochemistry", q:"Which macromolecule has nucleotides as its monomers?", opts:["Carbohydrate","Lipid","Nucleic Acid","Protein"], ans:2 },
  { slide:17, section:"Biochemistry", q:"Which macromolecule is responsible for long-term energy storage and makes up the cell membrane?", opts:["Carbohydrate","Lipid","Protein","Nucleic Acid"], ans:1 },
  { slide:19, section:"Biochemistry", q:"What process forms macromolecules by combining monomers and REMOVING water?", opts:["Hydrolysis","Denaturation","Dehydration synthesis","Active transport"], ans:2 },
  { slide:19, section:"Biochemistry", q:"What process breaks down macromolecules by ADDING water?", opts:["Dehydration synthesis","Hydrolysis","Fermentation","Denaturation"], ans:1 },
  { slide:20, section:"Biochemistry", q:"Enzymes work by lowering which energy required for a chemical reaction to begin?", opts:["Reaction temperature","Activation energy","Product output","Bond energy"], ans:1 },
  { slide:21, section:"Biochemistry", q:"In the lock-and-key model, where does the substrate bind to the enzyme?", opts:["The codon","The active site","The nucleus","The vacuole"], ans:1 },
  { slide:21, section:"Biochemistry", q:"Exposure to abnormal pH or temperature can _____ an enzyme, making it non-functional.", opts:["Activate","Replicate","Denature","Merge"], ans:2 },

  // ── PART 3: The Cell ─────────────────────────────────────────────────────
  { slide:24, section:"The Cell", q:"Who coined the term 'cell' after observing cork under a microscope?", opts:["Matthias Schleiden","Theodor Schwann","Anton van Leeuwenhoek","Robert Hooke"], ans:3 },
  { slide:24, section:"The Cell", q:"Which scientist concluded that cells come ONLY from preexisting cells?", opts:["Robert Hooke","Rudolf Virchow","Matthias Schleiden","Rosalind Franklin"], ans:1 },
  { slide:25, section:"The Cell", q:"Why are cells so small? Because smaller cells have a:", opts:["Lower surface area to volume ratio","Larger surface area to volume ratio","Smaller nucleus","Fewer organelles"], ans:1 },
  { slide:26, section:"The Cell", q:"Which type of cell does NOT have a nucleus or membrane-bound organelles?", opts:["Animal cell","Plant cell","Eukaryotic cell","Prokaryotic cell"], ans:3 },
  { slide:27, section:"The Cell", q:"What is the jellylike substance inside cells that contains molecules and organelles?", opts:["Nucleus","Cytoplasm","Cell sap","Vacuole fluid"], ans:1 },
  { slide:28, section:"The Cell", q:"The cell membrane is described as 'selectively permeable', which means:", opts:["It lets everything in","It blocks everything","It allows some but not all materials to cross","It only allows water"], ans:2 },
  { slide:29, section:"The Cell", q:"Which cytoskeleton fiber provides cell STRENGTH?", opts:["Microtubules","Microfilaments","Intermediate filaments","Centrioles"], ans:2 },
  { slide:30, section:"The Cell", q:"Ribosomes link amino acids together to form:", opts:["DNA","Lipids","Proteins","Carbohydrates"], ans:2 },
  { slide:31, section:"The Cell", q:"Where is most of a eukaryotic cell's genetic information (DNA) stored?", opts:["Ribosome","Mitochondria","Nucleus","Vacuole"], ans:2 },
  { slide:32, section:"The Cell", q:"Which type of ER is studded with ribosomes and involved in protein synthesis?", opts:["Smooth ER","Rough ER","Golgi ER","Lysosomal ER"], ans:1 },
  { slide:33, section:"The Cell", q:"After leaving the ER, proteins are changed or packaged at the:", opts:["Lysosome","Nucleus","Ribosome","Golgi apparatus"], ans:3 },
  { slide:34, section:"The Cell", q:"Mitochondria convert food (glucose) into usable energy in the form of:", opts:["DNA","mRNA","Starch","ATP"], ans:3 },

// Section colors
const SECTION_COLORS = {
  "Scientific Investigation": "#f59e0b",
  "Biochemistry": "#a78bfa",
  "The Cell": "#34d399",
  "Transport": "#38bdf8",
  "Photosynthesis & Respiration": "#fb923c",
  "Cellular Division": "#f472b6",
  "DNA & Protein Synthesis": "#818cf8",
  "Genetics": "#4ade80",
  "Evolution": "#facc15",
  "Classification": "#e879f9",
  "Ecology": "#2dd4bf",
};

// State
let current = 0;
let score = 0;
let correct = 0;
let wrong = 0;
let answered = [];
let missedList = [];
let sectionStats = {};

// Initialize sectionStats
QUESTIONS.forEach(q => {
  if (!sectionStats[q.section]) sectionStats[q.section] = { correct: 0, total: 0 };
  sectionStats[q.section].total++;
});

function startQuiz() {
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('quizScreen').classList.remove('hidden');
  document.getElementById('hdrScore').style.display = '';
  showQuestion();
}

function showQuestion() {
  const q = QUESTIONS[current];
  document.getElementById('qNum').textContent = `Q ${current + 1} / ${QUESTIONS.length}`;
  document.getElementById('qSlide').textContent = `Slide ${q.slide}`;
  const sec = document.getElementById('qSection');
  sec.textContent = q.section;
  sec.style.color = SECTION_COLORS[q.section] || 'var(--muted)';
  sec.style.background = 'var(--surface2)';

  document.getElementById('qText').textContent = q.q;

  const wrap = document.getElementById('optionsWrap');
  wrap.innerHTML = '';
  const letters = ['A','B','C','D'];
  q.opts.forEach((opt, i) => {
    const div = document.createElement('div');
    div.className = 'option';
    div.innerHTML = `<span class="option-letter">${letters[i]}</span><span>${opt}</span>`;
    div.onclick = () => selectAnswer(i, div);
    wrap.appendChild(div);
  });

  document.getElementById('feedback').className = 'feedback';
  document.getElementById('feedback').textContent = '';
  document.getElementById('btnNext').className = 'btn-next';

  const pct = (current / QUESTIONS.length) * 100;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('liveScore').textContent = score;

  // Scroll to top
  window.scrollTo({ top: 0, behavior: 'smooth' });

  // Animate card
  const card = document.getElementById('qCard');
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = '';
}

function selectAnswer(chosen, el) {
  const q = QUESTIONS[current];
  const opts = document.querySelectorAll('.option');
  opts.forEach(o => { o.classList.add('locked'); o.onclick = null; });

  const fb = document.getElementById('feedback');
  const isCorrect = chosen === q.ans;

  if (isCorrect) {
    el.classList.add('correct');
    score += 4;
    correct++;
    sectionStats[q.section].correct++;
    fb.innerHTML = `<span class="feedback-icon">✓</span> Correct! +4 points`;
    fb.className = 'feedback show correct-fb';
  } else {
    el.classList.add('wrong');
    opts[q.ans].classList.add('correct');
    wrong++;
    missedList.push({ q, chosen });
    fb.innerHTML = `<span class="feedback-icon">✗</span> Incorrect. The correct answer was: <strong>${q.opts[q.ans]}</strong>`;
    fb.className = 'feedback show wrong-fb';
  }

  answered.push({ q, chosen, correct: isCorrect });
  document.getElementById('tallyCorrect').textContent = correct;
  document.getElementById('tallyWrong').textContent = wrong;
  document.getElementById('liveScore').textContent = score;
  document.getElementById('btnNext').className = 'btn-next show';

  // Update progress bar
  const pct = ((current + 1) / QUESTIONS.length) * 100;
  document.getElementById('progressBar').style.width = pct + '%';
}

function nextQuestion() {
  current++;
  if (current < QUESTIONS.length) {
    showQuestion();
  } else {
    showResults();
  }
}

function showResults() {
  document.getElementById('quizScreen').classList.add('hidden');
  document.getElementById('reviewScreen').classList.add('hidden');
  const rs = document.getElementById('resultsScreen');
  rs.classList.remove('hidden');
  rs.classList.add('show');
  document.getElementById('progressBar').style.width = '100%';

  document.getElementById('finalScore').textContent = score;

  // Arc animation
  const pct = score / 600;
  const circumference = 2 * Math.PI * 80; // 502.65
  const offset = circumference * (1 - pct);
  setTimeout(() => {
    document.getElementById('scoreArc').style.strokeDashoffset = offset;
  }, 200);

  // Grade
  const pctScore = (score / 600) * 100;
  let grade, emoji, msg;
  if (pctScore >= 90) { grade = 'A — Excellent!'; emoji = '🌟'; msg = 'Outstanding work! You have mastered Biology SOL content.'; }
  else if (pctScore >= 80) { grade = 'B — Great job!'; emoji = '🎉'; msg = "Strong performance! Review a few topics and you'll be fully ready."; }
  else if (pctScore >= 70) { grade = 'C — Good effort!'; emoji = '📚'; msg = 'Solid foundation. Focus on the missed questions to boost your score.'; }
  else if (pctScore >= 60) { grade = 'D — Keep studying!'; emoji = '💪'; msg = 'You know the basics. Intensive review of the missed topics will help.'; }
  else { grade = 'F — Study more!'; emoji = '🔬'; msg = 'Keep at it! Review the material section by section and try again.'; }

  document.getElementById('resultGrade').textContent = `${emoji} ${grade}`;
  document.getElementById('resultMsg').textContent = `${msg} (${Math.round(pctScore)}% — ${correct} correct out of ${QUESTIONS.length})`;

  // Breakdown cards
  const bd = document.getElementById('resultBreakdown');
  bd.innerHTML = `
    <div class="rb-card"><div class="rb-val">${score}</div><div class="rb-lbl">Score / 600</div></div>
    <div class="rb-card"><div class="rb-val">${correct}</div><div class="rb-lbl">Correct</div></div>
    <div class="rb-card"><div class="rb-val">${wrong}</div><div class="rb-lbl">Incorrect</div></div>
    <div class="rb-card"><div class="rb-val">${Math.round(pctScore)}%</div><div class="rb-lbl">Percentage</div></div>
  `;

  // Section bars
  const bars = document.getElementById('sectionBars');
  bars.innerHTML = '';
  Object.entries(sectionStats).forEach(([sec, data]) => {
    const pctSec = data.total ? Math.round((data.correct / data.total) * 100) : 0;
    const color = SECTION_COLORS[sec] || 'var(--accent)';
    bars.innerHTML += `
      <div class="sb-row">
        <span class="sb-label" style="color:${color}">${sec}</span>
        <div class="sb-bar-wrap"><div class="sb-bar" style="width:0%;background:${color}" data-w="${pctSec}"></div></div>
        <span class="sb-pct" style="color:${color}">${pctSec}%</span>
      </div>`;
  });
  setTimeout(() => {
    document.querySelectorAll('.sb-bar').forEach(b => b.style.width = b.dataset.w + '%');
  }, 300);

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function reviewMissed() {
  if (missedList.length === 0) {
    alert('No missed questions — perfect score on answered items!');
    return;
  }
  document.getElementById('resultsScreen').classList.remove('show');
  document.getElementById('resultsScreen').classList.add('hidden');
  document.getElementById('reviewScreen').classList.remove('hidden');

  const letters = ['A','B','C','D'];
  const rl = document.getElementById('reviewList');
  rl.innerHTML = '';
  missedList.forEach((item, idx) => {
    const { q, chosen } = item;
    const div = document.createElement('div');
    div.style.cssText = 'background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:20px;';
    div.innerHTML = `
      <div style="font-size:0.75rem;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:10px;">
        Slide ${q.slide} · <span style="color:${SECTION_COLORS[q.section]||'var(--muted)'}">${q.section}</span>
      </div>
      <div style="font-size:1rem;font-weight:600;margin-bottom:16px;line-height:1.5;">${idx+1}. ${q.q}</div>
      ${q.opts.map((opt,i) => {
        let style = 'padding:10px 14px;border-radius:8px;margin-bottom:8px;display:flex;align-items:center;gap:10px;font-size:0.9rem;';
        if (i === q.ans) style += 'background:var(--right-bg);border:1.5px solid var(--accent);color:#a7f3d0;';
        else if (i === chosen) style += 'background:var(--wrong-bg);border:1.5px solid var(--wrong);color:#fca5a5;';
        else style += 'background:var(--surface2);border:1.5px solid var(--border);color:var(--muted);';
        const icon = i === q.ans ? '✓' : (i === chosen ? '✗' : '');
        return `<div style="${style}"><span style="font-family:'DM Mono',monospace;min-width:20px;">${letters[i]}</span>${opt}${icon ? ` <span style="margin-left:auto;font-weight:700;">${icon}</span>` : ''}</div>`;
      }).join('')}
    `;
    rl.appendChild(div);
  });
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showResults() {
  document.getElementById('quizScreen').classList.add('hidden');
  document.getElementById('reviewScreen').classList.add('hidden');
  const rs = document.getElementById('resultsScreen');
  rs.classList.remove('hidden');
  rs.classList.add('show');
  document.getElementById('progressBar').style.width = '100%';

  document.getElementById('finalScore').textContent = score;

  const pct = score / 600;
  const circumference = 2 * Math.PI * 80;
  const offset = circumference * (1 - pct);
  setTimeout(() => { document.getElementById('scoreArc').style.strokeDashoffset = offset; }, 200);

  const pctScore = (score / 600) * 100;
  let grade, emoji, msg;
  if (pctScore >= 90) { grade = 'A — Excellent!'; emoji = '🌟'; msg = 'Outstanding work! You have mastered Biology SOL content.'; }
  else if (pctScore >= 80) { grade = 'B — Great job!'; emoji = '🎉'; msg = "Strong performance! Review a few topics and you'll be fully ready."; }
  else if (pctScore >= 70) { grade = 'C — Good effort!'; emoji = '📚'; msg = 'Solid foundation. Focus on the missed questions to boost your score.'; }
  else if (pctScore >= 60) { grade = 'D — Keep studying!'; emoji = '💪'; msg = 'You know the basics. Intensive review of missed topics will help.'; }
  else { grade = 'F — Study more!'; emoji = '🔬'; msg = 'Keep at it! Review the material section by section and try again.'; }

  document.getElementById('resultGrade').textContent = `${emoji} ${grade}`;
  document.getElementById('resultMsg').textContent = `${msg} (${Math.round(pctScore)}% — ${correct} correct out of ${QUESTIONS.length})`;

  document.getElementById('resultBreakdown').innerHTML = `
    <div class="rb-card"><div class="rb-val">${score}</div><div class="rb-lbl">Score / 600</div></div>
    <div class="rb-card"><div class="rb-val">${correct}</div><div class="rb-lbl">Correct</div></div>
    <div class="rb-card"><div class="rb-val">${wrong}</div><div class="rb-lbl">Incorrect</div></div>
    <div class="rb-card"><div class="rb-val">${Math.round(pctScore)}%</div><div class="rb-lbl">Percentage</div></div>
  `;

  const bars = document.getElementById('sectionBars');
  bars.innerHTML = '';
  Object.entries(sectionStats).forEach(([sec, data]) => {
    const pctSec = data.total ? Math.round((data.correct / data.total) * 100) : 0;
    const color = SECTION_COLORS[sec] || 'var(--accent)';
    bars.innerHTML += `
      <div class="sb-row">
        <span class="sb-label" style="color:${color}">${sec}</span>
        <div class="sb-bar-wrap"><div class="sb-bar" style="width:0%;background:${color}" data-w="${pctSec}"></div></div>
        <span class="sb-pct" style="color:${color}">${pctSec}%</span>
      </div>`;
  });
  setTimeout(() => {
    document.querySelectorAll('.sb-bar').forEach(b => b.style.width = b.dataset.w + '%');
  }, 300);

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function restartQuiz() {
  current = 0; score = 0; correct = 0; wrong = 0;
  answered = []; missedList = [];
  Object.keys(sectionStats).forEach(k => { sectionStats[k].correct = 0; });
  document.getElementById('resultsScreen').classList.remove('show');
  document.getElementById('resultsScreen').classList.add('hidden');
  document.getElementById('liveScore').textContent = 0;
  document.getElementById('tallyCorrect').textContent = 0;
  document.getElementById('tallyWrong').textContent = 0;
  document.getElementById('quizScreen').classList.remove('hidden');
  document.getElementById('progressBar').style.width = '0%';
  showQuestion();
}
</script>
</body>
